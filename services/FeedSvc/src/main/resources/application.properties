spring.application.name=feed-service
server.port=8084

spring.datasource.url=jdbc:postgresql://postgres:5432/feed_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.data.redis.host=redis
spring.data.redis.port=6379

spring.kafka.bootstrap-servers=kafka:29092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.group-id=feed-service-group

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true

ai.openai.api-key=${OPENAI_API_KEY:sk-test-key}
ai.embedding.model=text-embedding-3-small
ai.embedding.dimension=1536

feed.ranking.relevance-weight=0.6
feed.ranking.recency-weight=0.2
feed.ranking.popularity-weight=0.2
feed.cache.ttl=3600
feed.default.page-size=20

management.endpoints.web.exposure.include=health,info,prometheus
management.prometheus.metrics.export.enabled=true