server.port=8085

spring.application.name=ModerationSvc

# Database
spring.datasource.url=jdbc:postgresql://postgres:5432/moderation_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Cache & OpenAI
spring.cache.type=redis
spring.data.redis.host=redis
spring.data.redis.port=6379
openai.api.key=${OPENAI_API_KEY:}

# Kafka
spring.kafka.bootstrap-servers=kafka:29092
spring.kafka.consumer.group-id=moderation-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest

# Eureka
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# AI Moderation Thresholds
ai.moderation.toxicity-threshold=0.8
ai.moderation.auto-flag-threshold=0.9
ai.moderation.spam-threshold=0.7

# AI Reputation Scores
ai.reputation.initial-score=1.0
ai.reputation.min-score=0.0
ai.reputation.max-score=1.0
