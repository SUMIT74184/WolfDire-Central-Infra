spring.application.name=ModerationSvc

# Cache & OpenAI
spring.cache.type=redis
openai.api.key=${OPENAI_API_KEY:}

# AI Moderation Thresholds
ai.moderation.toxicity-threshold=0.8
ai.moderation.auto-flag-threshold=0.9
ai.moderation.spam-threshold=0.7

# AI Reputation Scores
ai.reputation.initial-score=1.0
ai.reputation.min-score=0.0
ai.reputation.max-score=1.0
