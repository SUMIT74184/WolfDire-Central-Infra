
spring.application.name=PostsvcWolf
server.port=8082

# ===== PostgreSQL =====
spring.datasource.url=jdbc:postgresql://postgres:5432/post_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== Redis =====
spring.data.redis.host=redis
spring.data.redis.port=6379

# ===== Kafka =====
spring.kafka.bootstrap-servers=kafka:29092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.group-id=post-service-group

# ===== Eureka =====
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true

# ===== Cloudflare R2 =====
cloudflare.r2.bucket-name=wolfdire-media-dev
cloudflare.r2.access-key=${CLOUDFLARE_R2_ACCESS_KEY:YOUR_CLOUDFLARE_R2_ACCESS_KEY}
cloudflare.r2.secret-key=${CLOUDFLARE_R2_SECRET_KEY:YOUR_CLOUDFLARE_R2_SECRET_KEY}
cloudflare.r2.endpoint=${CLOUDFLARE_R2_ENDPOINT:https://1234567890abcdef.r2.cloudflarestorage.com}
cloudflare.r2.public-url=${CLOUDFLARE_R2_PUBLIC_URL:https://pub-abcdef123456.r2.dev}

management.endpoints.web.exposure.include=health,info